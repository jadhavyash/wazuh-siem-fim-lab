<!-- Wazuh Agent Config — ossec.conf
     Path: C:\Program Files (x86)\ossec-agent\ossec.conf
     Restart: net stop WazuhSvc && net start WazuhSvc
     Author: Yash Jadhav -->
<ossec_config>
  <client>
    <server>
      <address>192.168.1.100</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>10</notify_time>
    <auto_restart>yes</auto_restart>
  </client>

  <!-- File Integrity Monitoring -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <directories realtime="yes" report_changes="yes" check_all="yes">
      C:\Users\abc\Test
    </directories>
    <directories check_all="yes">%WINDIR%/System32/drivers/etc</directories>
    <ignore>C:\Windows\Temp</ignore>
    <ignore type="sregex">.log$|.tmp$</ignore>
    <alert_new_files>yes</alert_new_files>
    <scan_on_start>yes</scan_on_start>
  </syscheck>

  <!-- Windows Event Collection -->
  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
    <query>Event/System[EventID=4624 or EventID=4625 or EventID=4672]</query>
  </localfile>
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
</ossec_config>
